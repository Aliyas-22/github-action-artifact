name: script running 
on:
  push:
     branches: [main]
jobs:
  set-up:
     runs-on: ubuntu-latest
     steps:
        - name: checkout the code
          uses: actions/checkout@v4
        - name: set up python
          uses: actions/setup-python@v5
          with:
              python-version: "3.11"
        - name: Install dependencies
          run: pip install -r requirements.txt
        - name: Run the python code
          run: python app.py
        
